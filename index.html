<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoster Login - Aura Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --red: #e63946;
            --red-dark: #b5202d;
            --red-glow: rgba(230, 57, 70, 0.25);
            --bg: #0d0d0f;
            --card: #141418;
            --border: rgba(230, 57, 70, 0.18);
            --text: #f0f0f2;
            --muted: #6b6b78;
            --input-bg: #0a0a0c;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(230,57,70,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230,57,70,0.04) 1px, transparent 1px);
            background-size: 44px 44px;
            z-index: 0;
            animation: gridPulse 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(230,57,70,0.12) 0%, transparent 70%);
            z-index: 0;
            animation: glowDrift 8s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes glowDrift {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(40px); }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04),
                0 20px 60px rgba(0,0,0,0.6),
                0 0 80px var(--red-glow);
            animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Top accent bar */
        .card-top {
            height: 4px;
            background: linear-gradient(90deg, var(--red-dark), var(--red), #ff6b7a, var(--red));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .card-header {
            padding: 32px 36px 20px;
            text-align: center;
            position: relative;
        }

        .logo-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(230,57,70,0.1);
            border: 2px solid rgba(230,57,70,0.3);
            margin-bottom: 16px;
            position: relative;
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px dashed rgba(230,57,70,0.2);
            animation: rotateSlow 12s linear infinite;
        }

        @keyframes rotateSlow {
            to { transform: rotate(360deg); }
        }

        .logo-ring i {
            color: var(--red);
            font-size: 22px;
        }

        .brand-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-name span {
            color: var(--red);
        }

        .brand-sub {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0 36px;
        }

        .card-body {
            padding: 28px 36px 32px;
        }

        .form-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 28px;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i.icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            transition: color 0.2s;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 44px 14px 42px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .input-wrap input::placeholder {
            color: rgba(107,107,120,0.6);
            font-size: 14px;
        }

        .input-wrap input:focus {
            outline: none;
            border-color: rgba(230,57,70,0.5);
            box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
        }

        .input-wrap input:focus ~ .icon,
        .input-wrap:focus-within i.icon {
            color: var(--red);
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            width: auto;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-pw:hover { color: var(--red); background: none; }

        .forgot-row {
            text-align: right;
            margin-top: -12px;
            margin-bottom: 24px;
        }

        .forgot-row a {
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-row a:hover { color: var(--red); }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(230,57,70,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover::after { opacity: 1; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-login.loading .spinner { display: inline-block; }
        .btn-login.loading .btn-text { display: none; }

        .msg-box {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-box.error   { background: rgba(230,57,70,0.1); color: #ff8a91; border: 1px solid rgba(230,57,70,0.25); }
        .msg-box.success { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
        .msg-box.warning { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }

        .card-footer {
            padding: 14px 36px 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .card-footer p {
            font-size: 11px;
            color: rgba(107,107,120,0.6);
            letter-spacing: 0.5px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.show { display: flex; }

        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 28px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: cardIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
        }

        .modal-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(230,57,70,0.1);
            border: 1px solid rgba(230,57,70,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .modal-icon i { color: var(--red); font-size: 20px; }

        .modal-box h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .modal-box p {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .modal-btn {
            padding: 10px 28px;
            background: rgba(230,57,70,0.15);
            color: var(--red);
            border: 1px solid rgba(230,57,70,0.3);
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            width: auto;
            transition: background 0.2s;
        }

        .modal-btn:hover { background: rgba(230,57,70,0.25); }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            .card-header { padding: 28px 24px 16px; }
            .card-body { padding: 24px 24px 28px; }
            .card-footer { padding: 12px 24px 18px; }
            .divider { margin: 0 24px; }
            .brand-name { font-size: 22px; }
        }

        @media (max-width: 360px) {
            .card-header { padding: 24px 18px 14px; }
            .card-body { padding: 20px 18px 24px; }
            .card-footer { padding: 10px 18px 16px; }
            .divider { margin: 0 18px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-top"></div>

    <div class="card-header">
        <div class="logo-ring">
            <i class="fas fa-bolt"></i>
        </div>
        <div class="brand-name">Aura <span>Battle</span></div>
        <div class="brand-sub">Hoster Portal</div>
    </div>

    <div class="divider"></div>

    <div class="card-body">
        <div class="form-title">Sign In</div>

        <div class="field">
            <label for="loginId">Username</label>
            <div class="input-wrap">
                <input type="text" id="loginId" placeholder="Enter your username" autocomplete="username" autocapitalize="none" spellcheck="false">
                <i class="fas fa-user icon"></i>
            </div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <i class="fas fa-lock icon"></i>
                <button class="toggle-pw" id="togglePw" type="button" tabindex="-1" aria-label="Toggle password">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div class="forgot-row">
            <a href="#" id="forgotLink">Forgot password?</a>
        </div>

        <button class="btn-login" id="loginBtn" type="button">
            <span class="spinner"></span>
            <span class="btn-text">Login</span>
        </button>

        <div class="msg-box" id="msgBox"></div>
    </div>

    <div class="card-footer">
        <p>&copy; 2025 Aura Battle &mdash; All rights reserved</p>
    </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-lock"></i></div>
        <h3>Reset Password</h3>
        <p>Please contact your administrator to reset your password.</p>
        <button class="modal-btn" id="closeModal">Got it</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
(function () {
    'use strict';
    const _a = atob, _j = JSON.parse;
    const _cfg = _j(_a('eyJhcGlLZXkiOiJBSXphU3lEN3BBc2RZcWtKekRiU3NpOHhiTHN5Mlg1czBiZ1AwNDAiLCJhdXRoRG9tYWluIjoiYXVyYS1iYXR0bGUtbWFpbi5maXJlYmFzZWFwcC5jb20iLCJkYXRhYmFzZVVSTCI6Imh0dHBzOi8vYXVyYS1iYXR0bGUtbWFpbi1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb20iLCJwcm9qZWN0SWQiOiJhdXJhLWJhdHRsZS1tYWluIiwic3RvcmFnZUJ1Y2tldCI6ImF1cmEtYmF0dGxlLW1haW4uZmlyZWJhc2VzdG9yYWdlLmFwcCIsIm1lc3NhZ2luZ1NlbmRlcklkIjoiNzYzNzc5OTkwMjg5IiwiYXBwSWQiOiIxOjc2Mzc3OTk5MDI4OTp3ZWI6NWNhYTdiYzg2MWU4MGI2ZjBiMDJiMCIsIm1lYXN1cmVtZW50SWQiOiJHLVpaWFowMEhLMDcifQ=='));
firebase.initializeApp(_cfg);
    const db = firebase.database();

    // ── DOM refs ────────────────────────────────────────────────────────────────
    const $id  = id => document.getElementById(id);
    const elUsername = $id('loginId');
    const elPassword = $id('password');
    const elLoginBtn = $id('loginBtn');
    const elMsg      = $id('msgBox');
    const elModal    = $id('forgotModal');
    const elTogglePw = $id('togglePw');
    const elEyeIcon  = $id('eyeIcon');
    const SESSION_KEY = 'h_sess';
    const SESSION_TTL = 90 * 60 * 1000; // 1.5 hours

    // ── Password toggle ─────────────────────────────────────────────────────────
    elTogglePw.addEventListener('click', () => {
        const isHidden = elPassword.type === 'password';
        elPassword.type = isHidden ? 'text' : 'password';
        elEyeIcon.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    // ── Message helper ──────────────────────────────────────────────────────────
    let msgTimer;
    function showMsg(text, type) {
        clearTimeout(msgTimer);
        elMsg.textContent = text;
        elMsg.className = 'msg-box ' + type;
        elMsg.style.display = 'block';
        msgTimer = setTimeout(() => { elMsg.style.display = 'none'; }, 5000);
    }

    // ── Set loading state ───────────────────────────────────────────────────────
    function setLoading(on) {
        elLoginBtn.disabled = on;
        elLoginBtn.classList.toggle('loading', on);
    }

    // ── Login ───────────────────────────────────────────────────────────────────
    async function doLogin() {
        const username = elUsername.value.trim();
        const password = elPassword.value;

        if (!username || !password) {
            showMsg('Please enter your username and password.', 'error');
            return;
        }
        if (password.length < 6) {
            showMsg('Password must be at least 6 characters.', 'error');
            return;
        }

        setLoading(true);

        try {
            const snap = await db.ref('hosters').once('value');
            let found = false;

            snap.forEach(child => {
                const d = child.val();
                // Only check username and password — no other fields
                if (d.username === username) {
                    found = true;
                    if (d.password !== password) {
                        showMsg('Incorrect password. Please try again.', 'error');
                        return true;
                    }
                    // Save session with only username
                    const sess = { id: child.key, username: d.username, t: Date.now() };
                    localStorage.setItem(SESSION_KEY, btoa(JSON.stringify(sess)));
                    showMsg('Login successful! Redirecting…', 'success');
                    setTimeout(() => { window.location.href = 'hoster-dashboard.html'; }, 1400);
                    return true;
                }
            });

            if (!found) showMsg('Username not found. Please try again.', 'error');
        } catch (err) {
            showMsg('Connection error. Please try again.', 'error');
        } finally {
            setLoading(false);
        }
    }

    elLoginBtn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    // ── Forgot password modal ───────────────────────────────────────────────────
    $id('forgotLink').addEventListener('click', e => {
        e.preventDefault();
        elModal.classList.add('show');
    });

    $id('closeModal').addEventListener('click', () => elModal.classList.remove('show'));
    elModal.addEventListener('click', e => { if (e.target === elModal) elModal.classList.remove('show'); });

    // ── Auto-redirect if session valid ──────────────────────────────────────────
    (function checkSession() {
        try {
            const raw = localStorage.getItem(SESSION_KEY);
            if (!raw) return;
            const sess = JSON.parse(atob(raw));
            if (Date.now() - sess.t < SESSION_TTL) {
                window.location.href = 'hoster-dashboard.html';
            } else {
                localStorage.removeItem(SESSION_KEY);
            }
        } catch (_) {
            localStorage.removeItem(SESSION_KEY);
        }
    })();

})();
</script>
</body>
</html>
